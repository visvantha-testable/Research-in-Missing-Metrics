name: nuget-audit-ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet restore NuGetAudit.sln
      - run: dotnet test NuGetAudit.sln --no-restore
      - run: dotnet run --project src/NuGetAuditPlatform -- trigger
